<body oncontextmenu="return false;">

    <div class="nav-left">
        <img src="logo(1).png" class="nav-logo">
        <div class="nav-title">منصه الشهيد طومر</div>
    </div>
    
    <div class="nav-right-actions">

<div class="container">
    <div class="welcome-section">
        <h1 id="greeting">مرحباً</h1>
        <p>اللهم ارحم اخي الشهيد هاني طومر واجعل مثواه الجنة، ووفق الطلاب للنجاح والتفوق.</p>

        <p>جاري مزامنة بياناتك...</p>

    <div id="content-grid" class="content-grid"></div>
</div>

<div id="video-modal">
    <button onclick="closeModal()" class="close-modal-btn">❌ إغلاق</button>
    <div class="modal-content-wrapper">
        <video id="modal-video"></video>
        <div id="modal-wm">اسم العميل</div>
        
        <div id="video-controls">
            <input id="progress-bar" type="range" value="0" min="0" max="100">

            <div class="controls-buttons-row">
                <button id="cinema-btn" class="apple-btn" onclick="toggleFullscreenModal()">⛶</button> 
                <button id="forward-btn" class="apple-btn">⏩</button>
                <button id="play-pause-btn" class="apple-btn play">▶</button>
                <button id="backward-btn" class="apple-btn">⏪</button>
                <button id="speed-btn" class="apple-btn">1x</button>
            </div>

            <div id="speed-menu">
                <div onclick="setSpeed(0.25)">0.25x</div>
                <div onclick="setSpeed(0.5)">0.5x</div>
                <div onclick="setSpeed(1)">1x</div>
                <div onclick="setSpeed(1.25)">1.25x</div>
                <div onclick="setSpeed(1.5)">1.5x</div>
                <div onclick="setSpeed(2)">2x</div>
            </div>
        </div>
    </div>
</div>
